name: ai_study_assistant
description: "AI-powered study assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP & API
  dio: ^5.7.0

  # Environment variables
  flutter_dotenv: ^5.1.0

  # PDF handling
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^27.1.48

  # UI
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.3+1

  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true